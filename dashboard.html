<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채점 결과 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:#2e3348;--accent:#4f8aff;--accent2:#a259ff;
  --green:#2ecc8a;--yellow:#f5c842;--red:#ff5e5e;
  --text:#e8eaf6;--muted:#7b82a8;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:17px;font-weight:700;}
.topbar h1 span{color:var(--accent);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite;display:inline-block;margin-right:6px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

#cfg{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 24px;display:none;}
#cfg.open{display:block;}
.cfg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.cfg-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.cfg-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;font-family:'DM Mono',monospace;outline:none;}
.cfg-field input:focus{border-color:var(--accent);}

.main{padding:22px 24px;max-width:1300px;margin:0 auto;}

.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.scard.c1::before{background:var(--accent)}.scard.c2::before{background:var(--accent2)}.scard.c3::before{background:var(--green)}.scard.c4::before{background:var(--yellow)}.scard.c5::before{background:var(--red)}
.scard .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.scard .val{font-size:30px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
.scard.c1 .val{color:var(--accent)}.scard.c2 .val{color:var(--accent2)}.scard.c3 .val{color:var(--green)}.scard.c4 .val{color:var(--yellow)}.scard.c5 .val{color:var(--red)}

.twocol{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
@media(max-width:860px){.twocol{grid-template-columns:1fr}.main{padding:14px}.topbar{padding:12px 14px}.topbar-btns{flex-wrap:wrap;gap:6px;}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px;}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd h2{font-size:14px;font-weight:700;}
.card-hd .sub{font-size:12px;color:var(--muted);}
.card-bd{padding:14px 18px;}

.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 10px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}

.badge{display:inline-flex;align-items:center;justify-content:center;min-width:50px;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;font-family:'DM Mono',monospace;}
.badge.hi{background:rgba(46,204,138,.15);color:var(--green)}
.badge.md{background:rgba(79,138,255,.15);color:var(--accent)}
.badge.lo{background:rgba(245,200,66,.15);color:var(--yellow)}
.badge.fl{background:rgba(255,94,94,.15);color:var(--red)}

.bar-wrap{display:flex;align-items:center;gap:8px;}
.bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.bar-pct{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;min-width:30px;text-align:right;}

.prob-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:7px;}
.pcell{background:var(--surface2);border-radius:8px;padding:9px 4px;text-align:center;cursor:pointer;transition:transform .15s;}
.pcell:hover{transform:translateY(-2px);}
.pcell .pn{font-size:11px;color:var(--muted);margin-bottom:4px;font-family:'DM Mono',monospace;}
.pcell .pr{font-size:16px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}
.pcell .ps{font-size:9px;color:var(--muted);margin-top:3px;}

.wtags{display:flex;flex-wrap:wrap;gap:4px;}
.wtag{display:inline-block;padding:2px 7px;background:rgba(255,94,94,.12);color:var(--red);border-radius:4px;font-size:11px;font-family:'DM Mono',monospace;}

.btn{padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:600;transition:opacity .2s;}
.btn:hover{opacity:.85;}
.btn-p{background:var(--accent);color:#fff;}
.btn-g{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-d{background:rgba(255,94,94,.15);color:var(--red);border:1px solid rgba(255,94,94,.3);}
.btn-sm{padding:4px 9px;font-size:11px;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--muted);gap:10px;font-size:14px;text-align:center;}
.empty .ico{font-size:36px;}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;padding:20px;}
#modal.open{display:flex;}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:18px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;padding:26px;}
.mbox h3{font-size:16px;margin-bottom:16px;}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.mrow:last-child{border-bottom:none;}
.mrow .lbl{color:var(--muted);}
.meta-tag{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(162,89,255,.15);color:var(--accent2);}

.filter-bar{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-bar select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 10px;font-size:12px;outline:none;}

#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(16px);opacity:0;transition:all .3s;z-index:999;}
#toast.show{transform:translateY(0);opacity:1;}

@keyframes newrow{from{background:rgba(79,138,255,.15)}to{background:transparent}}
.new-row td{animation:newrow 3s ease forwards;}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <h1>📊 채점 <span>대시보드</span></h1>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;" class="topbar-btns">
    <span class="ts"><span class="live-dot"></span><span id="lastUpdated">–</span></span>
    <button class="btn btn-g btn-sm" onclick="toggleCfg()">⚙️ GitHub 설정</button>
    <button class="btn btn-d btn-sm" onclick="deleteAllResults()">🗑️ 전체 삭제</button>
    <button class="btn btn-p btn-sm" onclick="loadResults()">🔄 새로고침</button>
  </div>
</div>

<div id="cfg">
  <div class="cfg-grid">
    <div class="cfg-field"><label>GitHub 사용자명</label><input id="cfgUser" placeholder="예: myname"></div>
    <div class="cfg-field"><label>저장소(Repo) 이름</label><input id="cfgRepo" placeholder="예: quiz-answers"></div>
    <div class="cfg-field"><label>Personal Access Token</label><input id="cfgToken" type="password" placeholder="ghp_xxxxxxxxxxxx"></div>
  </div>
  <div style="margin-top:12px;display:flex;gap:8px;">
    <button class="btn btn-p btn-sm" onclick="saveCfg()">💾 저장 후 불러오기</button>
    <button class="btn btn-g btn-sm" onclick="toggleCfg()">닫기</button>
  </div>
  <p style="margin-top:10px;font-size:12px;color:var(--muted);">💡 GitHub Pages가 활성화된 Public 저장소와 token이 필요합니다. token은 이 브라우저에만 저장됩니다.</p>
</div>

<div class="main">

  <div class="summary">
    <div class="scard c1"><div class="lbl">총 제출</div><div class="val" id="sTot">–</div></div>
    <div class="scard c3"><div class="lbl">평균 점수</div><div class="val" id="sAvg">–</div></div>
    <div class="scard c2"><div class="lbl">최고 점수</div><div class="val" id="sMax">–</div></div>
    <div class="scard c5"><div class="lbl">최저 점수</div><div class="val" id="sMin">–</div></div>
    <div class="scard c4"><div class="lbl">오늘 제출</div><div class="val" id="sToday">–</div></div>
  </div>

  <div class="card">
    <div class="filter-bar">
      <select id="fStudent" onchange="renderTable()"><option value="">전체 학생</option></select>
      <select id="fTitle" onchange="renderTable()"><option value="">전체 시험지</option></select>
      <select id="fScore" onchange="renderTable()">
        <option value="">점수 전체</option>
        <option value="high">80점 이상</option>
        <option value="mid">60~79점</option>
        <option value="low">60점 미만</option>
      </select>
      <select id="fSort" onchange="renderTable()">
        <option value="newest">최신순</option>
        <option value="score_desc">점수 높은 순</option>
        <option value="score_asc">점수 낮은 순</option>
        <option value="student">학생명순</option>
      </select>
    </div>
    <div style="overflow-x:auto;">
      <table class="tbl">
        <thead><tr>
          <th>학생</th><th>시험지</th><th>점수</th><th>정답률</th><th>오답 문제</th><th>제출 시각</th><th></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="tableEmpty" class="empty" style="display:none;">
      <div class="ico">📭</div>
      <div>아직 제출된 결과가 없습니다.</div>
      <div style="font-size:12px;">학생이 QR 채점을 완료하면 여기에 자동으로 표시됩니다.</div>
    </div>
  </div>

  <div class="twocol">
    <div class="card" style="margin-bottom:0;">
      <div class="card-hd"><h2>📉 문제별 오답률</h2><span class="sub" id="probSub">–</span></div>
      <div class="card-bd"><div class="prob-grid" id="probGrid"><div class="empty" style="grid-column:1/-1"><div class="ico">📊</div><div>데이터 없음</div></div></div></div>
    </div>
    <div class="card" style="margin-bottom:0;">
      <div class="card-hd"><h2>🧠 오답 원인 분석</h2><span class="sub" id="metaSub">–</span></div>
      <div class="card-bd" id="metaChart"><div class="empty"><div class="ico">🧐</div><div>데이터 없음</div></div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd"><h2>👥 학생별 성취 현황</h2><span class="sub" id="studentSub">–</span></div>
    <div class="card-bd" id="studentChart"><div class="empty"><div class="ico">👤</div><div>데이터 없음</div></div></div>
  </div>

</div>

<div id="modal">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h3 id="mTitle">상세 결과</h3>
      <button class="btn btn-g btn-sm" onclick="closeModal()">✕ 닫기</button>
    </div>
    <div id="mBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
let allResults = [];
let filteredResults = [];
let refreshTimer = null;
let prevCount = 0;

window.onload = function() {
  loadCfg();
  if (getCfg().token) loadResults();
  refreshTimer = setInterval(() => { if (getCfg().token) loadResults(); }, 30000);
};

function getCfg() {
  return {
    user:  localStorage.getItem('db_gh_user')  || '',
    repo:  localStorage.getItem('db_gh_repo')  || '',
    token: localStorage.getItem('db_gh_token') || ''
  };
}
function loadCfg() {
  const c = getCfg();
  document.getElementById('cfgUser').value  = c.user;
  document.getElementById('cfgRepo').value  = c.repo;
  document.getElementById('cfgToken').value = c.token;
}
function saveCfg() {
  const u = document.getElementById('cfgUser').value.trim();
  const r = document.getElementById('cfgRepo').value.trim();
  const t = document.getElementById('cfgToken').value.trim();
  if (!u||!r||!t) { toast('⚠️ 모든 항목을 입력해주세요'); return; }
  localStorage.setItem('db_gh_user', u);
  localStorage.setItem('db_gh_repo', r);
  localStorage.setItem('db_gh_token', t);
  toggleCfg();
  loadResults();
}
function toggleCfg() {
  document.getElementById('cfg').classList.toggle('open');
}

// ── 구글 스프레드시트에서 결과 불러오기 ──
async function loadResults() {
  // 👇 아까 학생용 코드에 넣었던 것과 똑같은 구글 스크립트 URL을 여기에 넣으세요!
  const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyneXMqQ_HozdzHSO6qCo7IOsVo7bz9zM2v_dQbgStcejSAh3z-OP3pH2uCT2TCFlUItA/exec";
  
  document.getElementById('lastUpdated').textContent = '불러오는 중...';
  try {
    // 구글 서버에 데이터 요청 (GET)
    const res = await fetch(googleScriptUrl);
    if (!res.ok) throw new Error('데이터를 불러올 수 없습니다. (' + res.status + ')');
    
    // 구글 스크립트가 엑셀 데이터를 깔끔한 JSON 배열로 변환해서 돌려줍니다.
    const fetchedData = await res.json();
    
    if (fetchedData.status === "error") {
      throw new Error(fetchedData.message);
    }

    const newResults = fetchedData;
    const isNew = newResults.length > prevCount && prevCount > 0;
    prevCount = newResults.length;
    allResults = newResults;
    
    // 대시보드 화면 다시 그리기
    renderAll();

    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('ko-KR') + ' 업데이트';
    if (isNew) toast(`🔔 새 채점 결과가 도착했습니다!`);
    
  } catch(e) {
    document.getElementById('lastUpdated').textContent = '오류: ' + e.message;
    toast('❌ 불러오기 실패: ' + e.message);
  }
}

function renderAll() {
  updateSummary();
  updateFilters();
  renderTable();
  renderProbGrid();
  renderMetaChart();
  renderStudentChart();
}

function updateSummary() {
  if (!allResults.length) {
    ['sTot','sAvg','sMax','sMin','sToday'].forEach(id => document.getElementById(id).textContent = '–');
    return;
  }
  const scores = allResults.map(x => x.score||0);
  const todayStr = new Date().toLocaleDateString('ko-KR');
  const todayCnt = allResults.filter(r => {
    try { return r.gradedAt && r.gradedAt.includes(new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')); }
    catch { return false; }
  }).length;
  document.getElementById('sTot').textContent   = allResults.length;
  document.getElementById('sAvg').textContent   = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) + '%';
  document.getElementById('sMax').textContent   = Math.max(...scores) + '%';
  document.getElementById('sMin').textContent   = Math.min(...scores) + '%';
  // 오늘 제출 — gradedAt이 '2025. 1. 1. 오전 9:00:00' 형식이므로 날짜 앞부분만 비교
  const todayFull = new Date().toLocaleDateString('ko-KR');
  const todayCnt2 = allResults.filter(r => r.gradedAt && r.gradedAt.startsWith(todayFull.split('.')[0].trim())).length;
  // fallback: 파일명 타임스탬프 기반 (더 정확)
  const nowTs = Date.now();
  const oneDayMs = 86400000;
  const todayCnt3 = allResults.filter(r => {
    const fname = r._fname || '';
    const tsHex = fname.split('_')[0];
    const ts = parseInt(tsHex, 36);
    return !isNaN(ts) && (nowTs - ts) < oneDayMs;
  }).length;
  document.getElementById('sToday').textContent = todayCnt3;
}

function updateFilters() {
  const students = [...new Set(allResults.map(r=>r.student).filter(Boolean))].sort();
  const titles   = [...new Set(allResults.map(r=>r.title).filter(Boolean))].sort();
  const fS = document.getElementById('fStudent'), prevS = fS.value;
  const fT = document.getElementById('fTitle'),   prevT = fT.value;
  fS.innerHTML = '<option value="">전체 학생</option>' + students.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  fT.innerHTML = '<option value="">전체 시험지</option>' + titles.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('');
  if (prevS) fS.value = prevS;
  if (prevT) fT.value = prevT;
}

function renderTable() {
  const fS  = document.getElementById('fStudent').value;
  const fT  = document.getElementById('fTitle').value;
  const fSc = document.getElementById('fScore').value;
  const fSo = document.getElementById('fSort').value;

  filteredResults = allResults.filter(r => {
    if (fS && r.student !== fS) return false;
    if (fT && r.title !== fT) return false;
    if (fSc === 'high' && (r.score||0) < 80) return false;
    if (fSc === 'mid'  && ((r.score||0) < 60 || (r.score||0) >= 80)) return false;
    if (fSc === 'low'  && (r.score||0) >= 60) return false;
    return true;
  });

  filteredResults.sort((a,b) => {
    if (fSo==='score_desc') return (b.score||0)-(a.score||0);
    if (fSo==='score_asc')  return (a.score||0)-(b.score||0);
    if (fSo==='student')    return (a.student||'').localeCompare(b.student||'');
    return (b._fname||'').localeCompare(a._fname||'');
  });

  if (!filteredResults.length) {
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('tableEmpty').style.display = 'flex';
    return;
  }
  document.getElementById('tableEmpty').style.display = 'none';

  document.getElementById('tbody').innerHTML = filteredResults.map((r, idx) => {
    const pct = r.score||0;
    const cls = pct>=80?'hi':pct>=60?'md':pct<40?'fl':'lo';
    const wrongs = (r.results||[]).filter(x=>!x.correct).map(x=>x.number+'번');
    const wrongHtml = wrongs.length
      ? wrongs.map(w=>`<span class="wtag">${w}</span>`).join('')
      : '<span style="color:var(--green);font-size:12px;">전부 정답 🎉</span>';
    return `<tr${idx===0?' class="new-row"':''}>
      <td><strong>${esc(r.student||'?')}</strong></td>
      <td style="color:var(--muted);font-size:12px;">${esc(r.title||'–')}</td>
      <td><span class="badge ${cls}">${pct}%</span></td>
      <td><div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${pct>=80?'var(--green)':pct>=60?'var(--accent)':'var(--red)'}"></div></div><span class="bar-pct">${r.correct||0}/${r.total||0}</span></div></td>
      <td><div class="wtags">${wrongHtml}</div></td>
      <td class="ts">${esc(r.gradedAt||'–')}</td>
      <td><button class="btn btn-g btn-sm" onclick="showDetail(${idx})">상세</button></td>
    </tr>`;
  }).join('');
}

function renderProbGrid() {
  if (!allResults.length) {
    document.getElementById('probGrid').innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="ico">📊</div><div>데이터 없음</div></div>';
    document.getElementById('probSub').textContent = '–'; return;
  }
  const totMap={}, wrongMap={};
  allResults.forEach(r => {
    (r.results||[]).forEach(p => {
      totMap[p.number]  = (totMap[p.number]||0)+1;
      if (!p.correct) wrongMap[p.number] = (wrongMap[p.number]||0)+1;
    });
  });
  const nums = Object.keys(totMap).map(Number).sort((a,b)=>a-b);
  document.getElementById('probSub').textContent = nums.length + '문제';
  document.getElementById('probGrid').innerHTML = nums.map(n => {
    const tot=totMap[n]||1, wrong=wrongMap[n]||0;
    const rate=Math.round(wrong/tot*100);
    const col=rate>=70?'var(--red)':rate>=40?'var(--yellow)':'var(--green)';
    return `<div class="pcell" onclick="showProbDetail(${n})" title="${n}번: ${wrong}/${tot}명 오답">
      <div class="pn">${n}번</div>
      <div class="pr" style="color:${col}">${rate}%</div>
      <div class="ps">오답률</div>
    </div>`;
  }).join('');
}

function renderMetaChart() {
  const counts={};
  const labelMap={'계산실수':'🧮 계산 실수','집중력부족':'😵 문제 잘못 읽음','조건활용못함':'⚙️ 조건 활용 못함','식세우기어려움':'🧩 식 세우기 어려움','개념연결못함':'📖 개념 모름'};
  allResults.forEach(r => {
    (r.results||[]).forEach(p => {
      if (!p.metaReason) return;
      const key = Object.keys(labelMap).find(k=>p.metaReason.includes(k)) || p.metaReason;
      counts[key]=(counts[key]||0)+1;
    });
  });
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if (!entries.length) {
    document.getElementById('metaChart').innerHTML = '<div class="empty"><div class="ico">🧐</div><div>메타인지 데이터 없음</div></div>';
    document.getElementById('metaSub').textContent = '–'; return;
  }
  const max=entries[0][1];
  document.getElementById('metaSub').textContent = entries.reduce((a,b)=>a+b[1],0)+'건';
  document.getElementById('metaChart').innerHTML = entries.map(([key,cnt]) => {
    const label=labelMap[key]||key, pct=Math.round(cnt/max*100);
    return `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span>${label}</span><span style="color:var(--muted);font-family:'DM Mono',monospace;">${cnt}건</span></div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:var(--accent2)"></div></div>
    </div>`;
  }).join('');
}

function renderStudentChart() {
  if (!allResults.length) {
    document.getElementById('studentChart').innerHTML = '<div class="empty"><div class="ico">👤</div><div>데이터 없음</div></div>';
    document.getElementById('studentSub').textContent = '–'; return;
  }
  const map={};
  allResults.forEach(r => {
    const s=r.student||'?';
    if (!map[s]) map[s]={scores:[],cnt:0};
    map[s].scores.push(r.score||0);
    map[s].cnt++;
  });
  const students = Object.entries(map)
    .map(([name,d])=>({name,avg:Math.round(d.scores.reduce((a,b)=>a+b,0)/d.scores.length),cnt:d.cnt}))
    .sort((a,b)=>b.avg-a.avg);
  document.getElementById('studentSub').textContent = students.length+'명';
  document.getElementById('studentChart').innerHTML = students.map(s => {
    const col=s.avg>=80?'var(--green)':s.avg>=60?'var(--accent)':'var(--red)';
    const cls=s.avg>=80?'hi':s.avg>=60?'md':'fl';
    return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);">
      <div style="min-width:70px;font-size:13px;font-weight:600;">${esc(s.name)}</div>
      <div style="flex:1;"><div class="bar-wrap"><div class="bar"><div class="bar-fill" style="width:${s.avg}%;background:${col}"></div></div><span class="bar-pct">${s.avg}%</span></div></div>
      <span class="badge ${cls}">${s.avg}%</span>
      <span style="font-size:11px;color:var(--muted);">${s.cnt}회 제출</span>
    </div>`;
  }).join('');
}

function showDetail(idx) {
  const r = filteredResults[idx]; if (!r) return;
  document.getElementById('mTitle').textContent = `📋 ${r.student} — ${r.title}`;
  const pct=r.score||0, cls=pct>=80?'hi':pct>=60?'md':'fl';
  let html = `
    <div class="mrow"><span class="lbl">점수</span><span class="badge ${cls}">${pct}%</span></div>
    <div class="mrow"><span class="lbl">정답</span><span>${r.correct||0} / ${r.total||0} 문제</span></div>
    <div class="mrow"><span class="lbl">제출 시각</span><span class="ts">${esc(r.gradedAt||'–')}</span></div>
    <div style="margin:16px 0 8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">문제별 결과</div>`;
  (r.results||[]).forEach(p => {
    const meta = p.metaReason ? `<span class="meta-tag">${esc(p.metaReason)}</span>` : '';
    html += `<div class="mrow">
      <span class="lbl">${p.number}번</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        <span>${p.correct?'✅ 정답':'❌ 오답'}</span>
        ${!p.correct&&p.userAnswer?`<span style="color:var(--muted);font-size:12px;">학생 답: ${esc(p.userAnswer)}</span>`:''}
        ${meta}
      </div>
    </div>`;
  });
  document.getElementById('mBody').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function showProbDetail(num) {
  const relevant = allResults.filter(r=>(r.results||[]).some(p=>p.number===num));
  const wrongCount = relevant.filter(r=>{const p=(r.results||[]).find(x=>x.number===num);return p&&!p.correct;}).length;
  document.getElementById('mTitle').textContent = `📊 ${num}번 문제 분석`;
  let html = `
    <div class="mrow"><span class="lbl">응시 인원</span><span>${relevant.length}명</span></div>
    <div class="mrow"><span class="lbl">오답 인원</span><span style="color:var(--red)">${wrongCount}명</span></div>
    <div class="mrow"><span class="lbl">오답률</span><span style="color:var(--red)">${relevant.length?Math.round(wrongCount/relevant.length*100):0}%</span></div>
    <div style="margin:16px 0 8px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">학생별</div>`;
  relevant.forEach(r => {
    const p=(r.results||[]).find(x=>x.number===num); if(!p) return;
    const meta = p.metaReason ? `<span class="meta-tag">${esc(p.metaReason)}</span>` : '';
    html += `<div class="mrow">
      <span>${esc(r.student||'?')}</span>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
        <span>${p.correct?'✅':'❌'}</span>
        ${!p.correct&&p.userAnswer?`<span style="color:var(--muted);font-size:12px;">${esc(p.userAnswer)}</span>`:''}
        ${meta}
      </div>
    </div>`;
  });
  document.getElementById('mBody').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });

async function deleteAllResults() {
  if (!confirm('GitHub의 results 폴더 내 파일을 모두 삭제하시겠습니까?\n(되돌릴 수 없습니다)')) return;
  const {user,repo,token}=getCfg();
  if (!token) { toast('⚠️ 설정을 먼저 저장해주세요'); return; }
  try {
    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/results`,
      {headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json'}});
    if (!res.ok) { toast('삭제 실패: '+res.status); return; }
    const files = await res.json();
    toast(`🗑️ ${files.length}개 파일 삭제 중...`);
    await Promise.all(files.map(f=>fetch(`https://api.github.com/repos/${user}/${repo}/contents/${f.path}`,{
      method:'DELETE',
      headers:{Authorization:'token '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'결과 삭제',sha:f.sha})
    })));
    allResults=[]; renderAll(); prevCount=0;
    toast('✅ 전체 삭제 완료');
  } catch(e) { toast('❌ 삭제 오류: '+e.message); }
}

let toastTimer;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3500);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
