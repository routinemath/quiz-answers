<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 채점 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
  --border:#2e3348;--accent:#4f8aff;--accent2:#a259ff;
  --green:#2ecc8a;--yellow:#f5c842;--red:#ff5e5e;
  --text:#e8eaf6;--muted:#7b82a8;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:17px;font-weight:700;}
.topbar h1 span{color:var(--accent);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite;display:inline-block;margin-right:6px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}

.main{padding:22px 24px;max-width:1300px;margin:0 auto;}

.student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; margin-top: 20px; }
.student-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; cursor: pointer; transition: transform 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
.student-card::before { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent); border-radius:var(--radius) 0 0 var(--radius); }
.student-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.student-card .name { font-size: 20px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.student-card .stat { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

.detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.detail-header h2 { font-size: 24px; font-weight: 900; color: var(--accent); display: flex; align-items: center; gap: 10px; }

.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.scard.c1::before{background:var(--accent)}.scard.c2::before{background:var(--accent2)}.scard.c3::before{background:var(--green)}.scard.c4::before{background:var(--yellow)}.scard.c5::before{background:var(--red)}
.scard .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.scard .val{font-size:30px;font-weight:900;font-family:'DM Mono',monospace;line-height:1;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px;}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd h2{font-size:14px;font-weight:700;}
.card-bd{padding:14px 18px;}

.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:11px;color:var(--muted);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 10px;font-size:13px;border-bottom:1px solid var(--border);}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:50px;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;}
.badge.hi{background:rgba(46,204,138,.15);color:var(--green)}
.badge.md{background:rgba(79,138,255,.15);color:var(--accent)}
.badge.fl{background:rgba(255,94,94,.15);color:var(--red)}
.wtags{display:flex;flex-wrap:wrap;gap:4px;}
.wtag{display:inline-block;padding:2px 7px;background:rgba(255,94,94,.12);color:var(--red);border-radius:4px;font-size:11px;}
.bar{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.btn{padding:7px 14px;border-radius:8px;border:none;font-size:12px;cursor:pointer;font-weight:600;}
.btn-p{background:var(--accent);color:#fff;}
.btn-g{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:4px 9px;font-size:11px;}

.tab-btn { background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:8px 16px; border-radius:20px; font-size:13px; cursor:pointer; font-weight:bold; transition:all 0.2s; }
.tab-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

#modal, #manualModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#modal.open{display:flex;}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-height:90vh;overflow-y:auto;padding:26px;}
.mbox h3{font-size:16px;margin-bottom:16px;}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;}
.meta-tag{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(162,89,255,.15);color:var(--accent2);}
.meta-tag.special{background:rgba(245,158,11,.15);color:var(--yellow);}
.cfg-field{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px;outline:none;}
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(16px);opacity:0;transition:all .3s;z-index:999;}
#toast.show{transform:translateY(0);opacity:1;}

.grass-grid { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 8px; }
.grass-col { display: flex; flex-direction: column; gap: 4px; }
.grass-cell { width: 14px; height: 14px; border-radius: 3px; background: var(--surface2); cursor: pointer; position: relative; }
.grass-cell.l1 { background: rgba(46,204,138, 0.3); }
.grass-cell.l2 { background: rgba(46,204,138, 0.6); }
.grass-cell.l3 { background: rgba(46,204,138, 1); }
.grass-cell:hover::after { content: attr(title); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 4px 8px; font-size: 11px; border-radius: 4px; white-space: nowrap; z-index: 10; pointer-events: none; margin-bottom: 4px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>📊 스마트 <span>대시보드</span></h1>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <span class="ts"><span class="live-dot"></span><span id="lastUpdated">–</span></span>
    <button class="btn btn-g btn-sm" style="border-color:var(--accent); color:var(--accent);" onclick="openManualGrade()">📝 수기 채점 추가</button>
    <button class="btn btn-p btn-sm" onclick="loadResults()">🔄 데이터 동기화</button>
  </div>
</div>

<div id="mainView" class="main">
  <div style="margin-bottom: 20px;">
    <h2 style="font-size: 20px; font-weight: 700;">👥 학생 목록</h2>
    <p style="color: var(--muted); font-size: 13px; margin-top: 5px;">상세 기록을 보려면 학생 카드를 클릭하세요.</p>
  </div>
  <div id="studentGrid" class="student-grid"></div>
</div>

<div id="detailView" class="main" style="display:none;">
  <div class="detail-header">
    <h2 id="detailTitle">👤 학생 이름</h2>
    <button class="btn btn-g" onclick="showMainView()">⬅️ 전체 목록으로</button>
  </div>
  
  <div class="summary">
    <div class="scard c1"><div class="lbl">총 제출</div><div class="val" id="dTot">–</div></div>
    <div class="scard c3"><div class="lbl">평균 점수</div><div class="val" id="dAvg">–</div></div>
    <div class="scard c2"><div class="lbl">최고 점수</div><div class="val" id="dMax">–</div></div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 18px;">
    <div class="card" style="margin-bottom:0;">
      <div class="card-hd"><h2>🌱 최근 30일 학습 성실도</h2><span style="font-size:11px;color:var(--muted);">진할수록 많은 문제를 풀었습니다</span></div>
      <div class="card-bd" style="overflow-x:auto;">
        <div id="grassGrid" class="grass-grid"></div>
      </div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px;">
    <div class="card" style="margin-bottom:0;">
      <div class="card-hd"><h2>📚 교재별 단원 정답률</h2></div>
      <div class="card-bd">
        <div id="bookTabs" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;"></div>
        <div style="height:250px; position:relative;">
          <canvas id="chapterChart"></canvas>
        </div>
      </div>
    </div>
    
    <div class="card" style="margin-bottom:0;">
      <div class="card-hd"><h2>📈 난이도별 누적 정답률 성장 추이</h2><span style="font-size:11px;color:var(--muted);">시간에 따른 실력 변화</span></div>
      <div class="card-bd" style="height:280px; position:relative;">
        <canvas id="diffTrendChart"></canvas>
      </div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 18px;">
    <div class="card" style="margin-bottom:0;">
      <div class="card-hd"><h2>📉 점수 성장 타임라인</h2></div>
      <div style="overflow-x:auto;">
        <table class="tbl">
          <thead><tr><th>시험지</th><th>점수 과정</th><th>최종 정답률</th><th>오답 문제</th><th>제출 일시</th><th>상세</th></tr></thead>
          <tbody id="detailTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 18px;">
    <div class="card" style="margin-bottom:0;">
      <div class="card-hd"><h2>🧠 주관적 오답 원인</h2></div>
      <div class="card-bd" id="detailMetaChart" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px;"></div>
    </div>
  </div>
</div>

<div id="modal">
  <div class="mbox" style="max-width:550px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h3 id="mTitle">상세 기록</h3>
      <button class="btn btn-g btn-sm" onclick="closeModal()">✕ 닫기</button>
    </div>
    <div id="mBody"></div>
  </div>
</div>

<div id="manualModal">
   <div class="mbox" style="max-width:650px;">
      <h3 style="font-size:18px; color:var(--accent); margin-bottom:15px;">📝 초고속 수기 채점</h3>
      <div style="background:var(--surface2); padding:15px; border-radius:8px; margin-bottom:15px;">
         <label style="font-size:12px; color:var(--muted); display:block; margin-bottom:5px;">1. 채점할 시험지 선택 (Index 연동)</label>
         <select id="mgSelectTest" class="cfg-field" onchange="selectMgTest()" style="margin-bottom:10px;"></select>
         <div style="display:flex; gap:10px;">
            <input id="mgStudent" placeholder="학생 이름" class="cfg-field" readonly>
            <input id="mgTitle" placeholder="시험지 제목" class="cfg-field" readonly>
            <input type="number" id="mgTotal" style="display:none;">
         </div>
      </div>
      <p style="font-size:12px; color:var(--muted); margin-bottom:15px;">💡 모두 <b>'정답(✅)'</b> 상태입니다. <b>틀린 번호를 클릭</b>해서 오답 원인을 체크하세요.</p>
      <div id="mgGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(100px, 1fr)); gap:10px; max-height:40vh; overflow-y:auto; padding-right:5px;"></div>
      <div style="margin-top:20px; text-align:right; border-top:1px solid var(--border); padding-top:16px;">
         <button class="btn btn-g" onclick="closeMg()">취소</button>
         <button class="btn btn-p" onclick="submitMg()">🚀 채점 완료 및 동기화</button>
      </div>
   </div>
</div>

<div id="toast"></div>

<script>
// Chart.js 전역 테마 설정 (어두운 테마용 흰색 글씨)
Chart.defaults.color = '#e8eaf6';
Chart.defaults.font.family = "'Noto Sans KR', sans-serif";

let allResults = [];
let filteredResults = [];
let currentDetailStudent = '';
let chapterChartInst = null;
let diffTrendInst = null;
let globalBookData = {}; 

window.onload = function() { loadResults(); };

async function loadResults() {
  const googleScriptUrl = "https://script.google.com/macros/s/AKfycbyneXMqQ_HozdzHSO6qCo7IOsVo7bz9zM2v_dQbgStcejSAh3z-OP3pH2uCT2TCFlUItA/exec";
  document.getElementById('lastUpdated').textContent = '데이터 동기화 중...';
  try {
    const res = await fetch(googleScriptUrl);
    if (!res.ok) throw new Error('데이터 로드 실패');
    const fetchedData = await res.json();
    if (fetchedData.status === "error") throw new Error(fetchedData.message);
    allResults = fetchedData;
    
    syncAllStudentsToLocalStorage();
    
    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('ko-KR') + ' 동기화 완료';
    renderMainView();
    if (currentDetailStudent && document.getElementById('detailView').style.display === 'block') openStudentDetail(currentDetailStudent);
  } catch(e) { toast('❌ 실패: ' + e.message); }
}

function syncAllStudentsToLocalStorage() {
    const studentMap = {};
    const timeSorted = [...allResults].sort((a,b) => new Date(a.gradedAt) - new Date(b.gradedAt));
    timeSorted.forEach(test => {
        const sName = test.student || '이름 없음';
        if (!studentMap[sName]) studentMap[sName] = {}; 
        (test.results || []).forEach(r => {
            if(!r.filename) return; 
            if(!studentMap[sName][r.filename]) { studentMap[sName][r.filename] = { level: '취약문제', correctStreak: 0, totalCorrect: 0, totalWrong: 0, history: [] }; }
            const prob = studentMap[sName][r.filename];
            if(r.correct) {
                prob.correctStreak++; prob.totalCorrect++;
                if(prob.correctStreak >= 3) prob.level = '완전정복'; else if(prob.correctStreak >= 1) prob.level = '복습필요';
            } else { prob.correctStreak = 0; prob.totalWrong++; prob.level = '취약문제'; }
            prob.history.push({ date: test.gradedAt, result: r.correct ? 'correct' : 'wrong' });
        });
    });
    Object.keys(studentMap).forEach(sName => { localStorage.setItem(`student_${sName}`, JSON.stringify(studentMap[sName])); });
}

function renderMainView() {
  const grid = document.getElementById('studentGrid');
  if (allResults.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">데이터가 없습니다.</div>'; return; }
  const studentMap = {};
  allResults.forEach(r => {
    const s = r.student || '이름 없음';
    if (!studentMap[s]) studentMap[s] = { scores: [], count: 0, lastDate: '' };
    studentMap[s].scores.push(r.score || 0); studentMap[s].count++;
    if (!studentMap[s].lastDate || r.gradedAt > studentMap[s].lastDate) studentMap[s].lastDate = r.gradedAt;
  });
  let html = '';
  Object.keys(studentMap).sort().forEach(name => {
    const data = studentMap[name];
    const avg = Math.round(data.scores.reduce((a,b)=>a+b,0) / data.count);
    const col = avg >= 80 ? 'var(--green)' : avg >= 60 ? 'var(--accent)' : 'var(--red)';
    html += `
      <div class="student-card" onclick="openStudentDetail('${esc(name)}')">
        <div class="name">👤 ${esc(name)}</div>
        <div class="stat"><span>총 제출</span> <span class="val" style="color:var(--text);">${data.count}회</span></div>
        <div class="stat"><span>평균 점수</span> <span class="val" style="color:${col};">${avg}점</span></div>
        <div class="stat"><span>최근 제출</span> <span class="val" style="font-size:11px; color:var(--muted);">${esc(data.lastDate).split(' ')[0]}</span></div>
      </div>`;
  });
  grid.innerHTML = html;
}

function showMainView() { 
  document.getElementById('detailView').style.display = 'none'; 
  document.getElementById('mainView').style.display = 'block'; 
  currentDetailStudent = ''; 
  updateCartUI(); 
}

function openStudentDetail(studentName) {
  currentDetailStudent = studentName;
  document.getElementById('mainView').style.display = 'none'; document.getElementById('detailView').style.display = 'block';
  document.getElementById('detailTitle').innerHTML = `👤 ${esc(studentName)} 학생 기록`;
  
  const sData = allResults.filter(r => (r.student || '이름 없음') === studentName);
  renderStudentDetail(sData);
  renderGrassChart(sData);        
  renderBookTabs(sData);          
  renderDifficultyTrend(sData);   
  updateCartUI(); 
}

// 최초 오답 추적 기능 포함
function renderStudentDetail(data) {
  const scores = data.map(r => r.score || 0);
  document.getElementById('dTot').textContent = data.length + '회';
  document.getElementById('dAvg').textContent = Math.round(scores.reduce((a,b)=>a+b,0)/data.length) + '점';
  document.getElementById('dMax').textContent = Math.max(...scores) + '점';
  
  renderMetaChart(data);

  const groups = {};
  const timeSorted = [...data].sort((a, b) => (a._fname||'').localeCompare(b._fname||''));
  timeSorted.forEach(r => { const key = r.title; if (!groups[key]) groups[key] = { title: r.title, attempts: [] }; groups[key].attempts.push(r); });
  const groupArray = Object.values(groups).reverse();
  const tb = document.getElementById('detailTbody');

  filteredResults = groupArray.map(g => {
      const latest = g.attempts[g.attempts.length - 1];
      const merged = JSON.parse(JSON.stringify(latest)); 
      const everWrongMap = {};
      
      g.attempts.forEach(a => {
          (a.results || []).forEach(p => {
              if (!p.correct && !everWrongMap[p.number]) {
                  everWrongMap[p.number] = { ...p };
              }
          });
      });

      merged.results.forEach(p => {
          if (everWrongMap[p.number]) {
              p.everWrong = true;
              p.wrongInstance = everWrongMap[p.number];
          } else {
              p.everWrong = false;
          }
      });
      return merged;
  });

  if (groupArray.length === 0) { tb.innerHTML = ''; return; }

  tb.innerHTML = groupArray.map((g, idx) => {
    const latest = filteredResults[idx]; const pct = latest.score || 0; const cls = pct >= 80 ? 'hi' : pct >= 60 ? 'md' : 'fl';
    const timeline = g.attempts.map(a => `${a.score||0}%`).join(' ➔ ');
    let everWrong = new Set(); g.attempts.forEach(a => { (a.results||[]).forEach(p => { if (!p.correct) everWrong.add(p.number); }); });
    const wrongs = Array.from(everWrong).sort((a,b)=>a-b).map(x=>x+'번');
    const wrongHtml = wrongs.length ? wrongs.map(w=>`<span class="wtag">${w}</span>`).join('') : '<span style="color:var(--green);font-size:12px;">처음부터 100점! 🎉</span>';
    
    const fullDate = esc(latest.gradedAt||'–'); 

    return `<tr>
      <td style="font-weight:bold;">${esc(g.title)} <span style="font-size:11px; color:var(--accent); font-weight:normal;">[${g.attempts.length}회]</span></td>
      <td><div style="font-weight:bold; color:var(--yellow); font-size:12px;">${timeline}</div></td>
      <td><span class="badge ${cls}">${pct}%</span></td>
      <td><div class="wtags">${wrongHtml}</div></td>
      <td class="ts" style="font-size:12px;">${fullDate}</td>
      <td><button class="btn btn-g btn-sm" onclick="showDetail(${idx})">상세</button></td>
    </tr>`;
  }).join('');
}

function renderGrassChart(data) {
    const grid = document.getElementById('grassGrid'); const today = new Date(); const dateCounts = {};
    data.forEach(test => {
        const dStr = new Date(test.gradedAt).toLocaleDateString('en-CA'); 
        const probCount = test.total || (test.results ? test.results.length : 0);
        dateCounts[dStr] = (dateCounts[dStr] || 0) + probCount;
    });
    let html = '';
    for(let col = 0; col < 6; col++) {
        html += `<div class="grass-col">`;
        for(let row = 0; row < 5; row++) {
            const daysAgo = 29 - (col * 5 + row);
            const d = new Date(today); d.setDate(today.getDate() - daysAgo);
            const dStr = d.toLocaleDateString('en-CA');
            const displayDate = d.toLocaleDateString('ko-KR', {month:'short', day:'numeric'});
            const count = dateCounts[dStr] || 0; let levelClass = '';
            if(count > 20) levelClass = 'l3'; else if(count > 10) levelClass = 'l2'; else if(count > 0) levelClass = 'l1';
            html += `<div class="grass-cell ${levelClass}" title="${displayDate}: ${count}문제 풀음"></div>`;
        }
        html += `</div>`;
    }
    grid.innerHTML = html;
}

function renderBookTabs(data) {
    globalBookData = {};
    data.forEach(test => {
        (test.results || []).forEach(r => {
            if(!r.filename || !r.filename.includes('_')) return; 
            const parts = r.filename.split('_');
            let book = parts[0].replace(/^RPM(\d)-/, 'RPM중$1-'); 
            let rest = parts.slice(1).join('_');
            let chapter = rest.split('-')[0].replace(/\.[^/.]+$/, ""); 
            
            if(!globalBookData[book]) globalBookData[book] = {};
            if(!globalBookData[book][chapter]) globalBookData[book][chapter] = { correct: 0, total: 0 };
            
            globalBookData[book][chapter].total++;
            if(r.correct) globalBookData[book][chapter].correct++;
        });
    });

    const tabsContainer = document.getElementById('bookTabs');
    const books = Object.keys(globalBookData);
    
    if(books.length === 0) {
        tabsContainer.innerHTML = '';
        document.getElementById('chapterChart').style.display = 'none';
        if(chapterChartInst) chapterChartInst.destroy();
        return;
    }

    tabsContainer.innerHTML = books.map((b, i) => 
        `<button class="tab-btn ${i===0?'active':''}" id="tabBtn_${i}" onclick="selectBookTab('${b}', ${i}, ${books.length})">${b}</button>`
    ).join('');
    
    selectBookTab(books[0], 0, books.length);
}

function selectBookTab(bookName, index, totalTabs) {
    for(let i=0; i<totalTabs; i++) {
        const btn = document.getElementById(`tabBtn_${i}`);
        if(btn) btn.classList.remove('active');
    }
    const activeBtn = document.getElementById(`tabBtn_${index}`);
    if(activeBtn) activeBtn.classList.add('active');

    const chData = globalBookData[bookName];
    const labels = [];
    const pcts = [];
    
    Object.keys(chData).forEach(ch => {
        if(chData[ch].total >= 2) { 
            let labelText = ch;
            if(ch.length > 7) labelText = [ch.substring(0,7), ch.substring(7,14) + (ch.length>14?'..':'')];
            labels.push(labelText);
            pcts.push(Math.round((chData[ch].correct / chData[ch].total) * 100));
        }
    });

    const ctx = document.getElementById('chapterChart');
    if(chapterChartInst) chapterChartInst.destroy();
    
    if(labels.length === 0) {
        ctx.style.display = 'none'; return;
    }
    
    ctx.style.display = 'block';
    const chartType = labels.length >= 3 ? 'radar' : 'bar';

    chapterChartInst = new Chart(ctx, {
        type: chartType,
        data: {
            labels: labels,
            datasets: [{
                label: '단원별 정답률(%)',
                data: pcts,
                backgroundColor: 'rgba(79, 138, 255, 0.4)',
                borderColor: 'rgba(79, 138, 255, 1)',
                pointBackgroundColor: 'rgba(79, 138, 255, 1)', 
                pointBorderColor: '#fff',
                borderWidth: 2,
                borderRadius: chartType === 'bar' ? 6 : 0
            }]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: chartType === 'radar' 
              ? { r: { angleLines: {color:'rgba(255,255,255,0.1)'}, grid: {color:'rgba(255,255,255,0.1)'}, pointLabels: {color:'#e8eaf6', font:{size:11, family:'Noto Sans KR', weight:'bold'}}, ticks:{display:false, min:0, max:100} } }
              : { y: { min:0, max:100, grid: {color:'rgba(255,255,255,0.05)'}, ticks:{color:'#e8eaf6'} }, x: { grid: {display:false}, ticks:{color:'#e8eaf6', font:{weight:'bold'}} } },
            plugins: { legend: {display:false}, tooltip: {callbacks: {label: (ctx) => ctx.raw + '%'}} }
        }
    });
}

function renderDifficultyTrend(data) {
    const timeSorted = [...data].sort((a,b) => new Date(a.gradedAt) - new Date(b.gradedAt));
    const timeline = [];
    const diffsSet = new Set();
    const cumulativeStats = {}; 
    
    timeSorted.forEach(test => {
        const dateStr = new Date(test.gradedAt).toLocaleDateString('ko-KR', {month:'short', day:'numeric'});
        const titleShort = test.title.length > 8 ? test.title.substring(0,8)+'..' : test.title;
        
        let hasValidData = false;
        const currentTestDiffs = new Set();

        (test.results || []).forEach(r => {
            if(!r.filename) return;
            const match = r.filename.match(/-(하|중하|중|중상|상|4점)\.png$/i);
            if(!match) return;
            const d = match[1];
            
            diffsSet.add(d);
            currentTestDiffs.add(d); 
            hasValidData = true;

            if(!cumulativeStats[d]) cumulativeStats[d] = { correct:0, total:0 };
            cumulativeStats[d].total++;
            if(r.correct) cumulativeStats[d].correct++;
        });
        
        if(hasValidData) {
            const stepValues = {};
            currentTestDiffs.forEach(d => {
                stepValues[d] = Math.round((cumulativeStats[d].correct / cumulativeStats[d].total) * 100);
            });
            timeline.push({ label: `${dateStr}\n${titleShort}`, values: stepValues });
        }
    });

    const targetDiffs = ['하', '중하', '중', '중상', '상', '4점'];
    const actualDiffs = targetDiffs.filter(d => diffsSet.has(d)); 
    const colors = {'하':'#2ecc8a', '중하':'#4f8aff', '중':'#a259ff', '중상':'#f5c842', '상':'#ff5e5e', '4점':'#ff0000'};

    const datasets = actualDiffs.map(d => ({
        label: d + ' 누적 정답률',
        data: timeline.map(t => t.values[d] !== undefined ? t.values[d] : null), 
        borderColor: colors[d],
        backgroundColor: colors[d],
        tension: 0.3, 
        spanGaps: true 
    }));

    const ctx = document.getElementById('diffTrendChart');
    if(diffTrendInst) diffTrendInst.destroy();
    
    if(datasets.length === 0) {
        ctx.parentElement.innerHTML = '<div class="empty"><div class="ico">📈</div><div>분석 가능한 난이도 추이 데이터가 없습니다.</div><canvas id="diffTrendChart" style="display:none;"></canvas></div>';
        return;
    }
    
    diffTrendInst = new Chart(ctx, {
        type: 'line',
        data: { labels: timeline.map(t => t.label.split('\n')[0]), datasets: datasets }, 
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false }, 
            scales: {
                y: { min: 0, max: 100, grid: {color:'rgba(255,255,255,0.05)'}, ticks: {color:'#e8eaf6'} },
                x: { grid: {color:'rgba(255,255,255,0.05)'}, ticks: {color:'#e8eaf6', font:{size:11}} }
            },
            plugins: {
                legend: { position: 'bottom', labels: { color: '#e8eaf6', usePointStyle: true, padding: 20 } },
                tooltip: { 
                    callbacks: { 
                        title: (ctx) => timeline[ctx[0].dataIndex].label.replace('\n', ' - '),
                        label: (ctx) => `${ctx.dataset.label}: ${ctx.raw}%` 
                    } 
                }
            }
        }
    });
}

function updateMeta(n, r, c) { if(c) { if(!mgData[n].meta.includes(r)) mgData[n].meta.push(r); } else { mgData[n].meta = mgData[n].meta.filter(x=>x!==r); } }

async function submitMg() {
    const student = document.getElementById('mgStudent').value.trim(); const title = document.getElementById('mgTitle').value.trim();
    const tot = parseInt(document.getElementById('mgTotal').value) || 20; const testId = document.getElementById('mgSelectTest').value;
    if(!student || !title) { toast('⚠️ 항목을 입력하세요!'); return; }
    
    const paper = (testId && testId !== 'manual' && localTestPapers[testId]) ? localTestPapers[testId] : null;
    let correctCount = 0; const results = [];
    
    for(let i=1; i<=tot; i++) {
        if(mgData[i].correct) correctCount++;
        let gUrl = ''; let fName = '';
        if (paper && paper.problems && paper.problems[i-1]) { gUrl = paper.problems[i-1].githubUrl || ''; fName = paper.problems[i-1].filename || ''; }
        results.push({ number: i, correct: mgData[i].correct, metaReason: mgData[i].meta.join(', '), githubUrl: gUrl, filename: fName });
    }
    const score = Math.round((correctCount / tot) * 100);
    const payload = { title, student, score, correct: correctCount, total: tot, gradedAt: new Date().toLocaleString('ko-KR'), results };
    
    const user = localStorage.getItem('db_gh_user'), repo = localStorage.getItem('db_gh_repo'), token = localStorage.getItem('db_gh_token');
    if(!user || !token) { toast('⚠️ 깃허브 설정 필요'); return; }
    
    document.getElementById('mgGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;">🚀 전송 중...</div>';
    
    try {
        const fileId = "manual_" + Date.now().toString(36) + "_" + Math.floor(Math.random()*10000);
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
        
        await fetch(`https://api.github.com/repos/${user}/${repo}/contents/results/${fileId}_result.json`, {
            method: 'PUT', headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: '수기 채점: ' + student, content })
        });
        
        if (paper) { localTestPapers[testId].status = '채점완료'; localStorage.setItem('testPapers', JSON.stringify(localTestPapers)); }
        
        const studentKey = `student_${student}`; let studentData = JSON.parse(localStorage.getItem(studentKey) || '{}');
        results.forEach(r => {
            if(!r.filename) return;
            if(!studentData[r.filename]) { studentData[r.filename] = { level: '취약문제', correctStreak: 0, totalCorrect: 0, totalWrong: 0, history: [] }; }
            if(r.correct) { studentData[r.filename].correctStreak++; studentData[r.filename].totalCorrect++;
                if(studentData[r.filename].correctStreak >= 3) studentData[r.filename].level = '완전정복';
                else if(studentData[r.filename].correctStreak >= 1) studentData[r.filename].level = '복습필요';
            } else { studentData[r.filename].correctStreak = 0; studentData[r.filename].totalWrong++; studentData[r.filename].level = '취약문제'; }
            studentData[r.filename].history.push({ date: new Date().toLocaleDateString('ko-KR'), result: r.correct ? 'correct' : 'wrong' });
        });
        localStorage.setItem(studentKey, JSON.stringify(studentData));

        // 화면 0.1초 즉시 반영 (마술)
        payload._fname = fileId + "_result.json";
        allResults.push(payload);
        
        toast(`🎉 전송 완료! 점수: ${score}점 (즉시 반영됨)`); closeMg(); 
        
        renderMainView();
        if (currentDetailStudent === student) {
            openStudentDetail(student);
        }
    } catch(e) { toast('❌ 실패: ' + e.message); }
}

</script>
</body>
</html>
